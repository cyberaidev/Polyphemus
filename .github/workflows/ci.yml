name: CI

on:
  push:
    branches: [main]
  pull_request:

# The pipeline runs fully offline in mock mode; no AWS credentials are used.
env:
  POLYPHEMUS_MODE: mock

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check src scripts tests api

      - name: Format check (black)
        run: black --check src scripts tests api

      - name: Type check (mypy)
        run: mypy src

      # Reproducibility of the committed SVG is checked on a single matrix cell
      # (it is Python-version independent) to avoid redundant work.
      - name: Render architecture diagram (reproducibility)
        if: matrix.python-version == '3.11'
        run: |
          python scripts/render_architecture.py
          if ! git diff --exit-code docs/architecture.svg; then
            echo "::error::docs/architecture.svg is out of date. Run 'make render-diagram' and commit the result (never hand-edit the SVG)."
            exit 1
          fi

      - name: Run tests (offline, mock mode)
        run: python -m pytest -q

      - name: Run demo smoke test (offline, mock mode)
        run: python scripts/run_demo.py

  # End-to-end via the Makefile (matches the documented contributor workflow).
  make-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: make setup / demo / test (offline)
        run: |
          make setup
          make demo
          make test

  # Offline IaC checks — no AWS credentials required (validate/synth/scan only).
  iac:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive iac/terraform

      - name: Terraform validate (per module, no backend/creds)
        run: |
          set -e
          for dir in iac/terraform iac/terraform/modules/*; do
            if ls "$dir"/*.tf >/dev/null 2>&1; then
              echo "== validating $dir =="
              terraform -chdir="$dir" init -backend=false -input=false >/dev/null
              terraform -chdir="$dir" validate
            fi
          done

      - name: Set up Python (for CDK synth)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: iac/cdk/requirements.txt

      - name: Set up Node (for the AWS CDK CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: CDK synth (offline, no deploy)
        working-directory: iac/cdk
        run: |
          npm install -g aws-cdk@2
          pip install -r requirements.txt
          cdk synth --context name_prefix=polyphemus \
            --context bedrock_text_model_id=anthropic.claude-3-5-sonnet-20240620-v1:0 \
            --context bedrock_embed_model_id=amazon.titan-embed-text-v2:0

      - name: Checkov scan of Terraform (pinned)
        uses: bridgecrewio/checkov-action@v12.2988.0
        with:
          directory: iac/terraform
          framework: terraform
          quiet: true
          soft_fail: true
