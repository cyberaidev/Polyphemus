name: CI

on:
  push:
    branches: [main]
  pull_request:

# The pipeline runs fully offline in mock mode; no AWS credentials are used.
env:
  POLYPHEMUS_MODE: mock

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check src scripts tests api

      - name: Format check (black)
        run: black --check src scripts tests api

      - name: Type check (mypy)
        run: mypy src

      - name: Render architecture diagram (reproducibility)
        run: |
          python scripts/render_architecture.py
          git diff --exit-code docs/architecture.svg

      - name: Run tests (offline, mock mode)
        run: python -m pytest -q

      - name: Run demo smoke test (offline, mock mode)
        run: python scripts/run_demo.py
